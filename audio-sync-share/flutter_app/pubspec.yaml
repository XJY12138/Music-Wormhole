name: audio_sync_share
description: A modern cross-platform audio synchronization app with beautiful UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI 组件
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  
  # 状态管理
  provider: ^6.1.1
  riverpod: ^2.4.9
  
  # 网络通信
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  
  # 服务发现
  mdns_throttle: ^0.1.2
  
  # 设备信息
  device_info_plus: ^9.1.1
  connectivity_plus: ^5.0.2
  
  # 权限处理
  permission_handler: ^11.1.0
  
  # 音频播放
  just_audio: ^0.9.36
  
  # 本地存储
  shared_preferences: ^2.2.2
  
  # 工具类
  intl: ^0.18.1
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
